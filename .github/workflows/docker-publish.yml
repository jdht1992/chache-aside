name: CI — Build & Push to Docker Hub

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


jobs:
  # ─────────────────────────────────────────
  # JOB 1: Lint & Test (runs on every push/PR)
  # ─────────────────────────────────────────
  test:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true          # caches the uv package cache across runs

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Run linter (ruff)
        run: uv run ruff check .

      - name: Run test
        run: uv run pytest --tb=short -q

  # ─────────────────────────────────────────
  # JOB 2: Build & Push (only on main merges)
  # ─────────────────────────────────────────
  docker:
    name: Build & Push Image
    needs: test # only runs if tests pass
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push FastAPI image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fastapi_cache_aside:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
