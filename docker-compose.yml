services:

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
  db:
    image: postgres:15
    container_name: cache-aside-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cache_aside_db
    volumes:
      - cache_aside_postgres:/var/lib/postgresql/data

  redis:
    image: redis
    container_name: cache_aside_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  cache_aside_postgres:
  redis_data:
